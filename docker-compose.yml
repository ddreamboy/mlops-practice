services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  emotion-classification-service:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    command: ["uv", "run", "--no-project", "uvicorn", "src.app:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ./train/model.joblib:/app/train/model.joblib:ro
    depends_on:
      - rabbitmq
      - redis

  frontend-gradio:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    command: ["uv", "run", "--no-project", "src/ui_gradio.py"]
    env_file:
      - .env
    ports:
      - "7860:7860"

  celery-worker:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    command: ["uv", "run", "--no-project", "celery", "-A", "src.celery_app:app", "worker", "-Q", "predict", "--loglevel=info"]
    env_file:
      - .env
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ./train/model.joblib:/app/train/model.joblib:ro
    depends_on:
      - rabbitmq
      - redis

  flower:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    command: ["uv", "run", "--no-project", "celery", "-A", "src.celery_app:app", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - redis
